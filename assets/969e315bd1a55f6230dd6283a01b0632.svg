<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="327.57508" height="607.46396" viewBox="0,0,327.57508,607.46396"><g transform="translate(-16.21246,-16.26802)"><g stroke-miterlimit="10"><path d="M17.96246,546.8c0,-131.98765 0,-397.86209 0,-466c0,-31.22081 34.92403,-62.78198 63.13755,-62.78198c36.87733,0 134.20195,0 199,0c35.9842,0 61.93753,30.98874 61.93753,61.78198c0,68.0195 0,336.05299 0,468c0,45.00812 -30.48217,74.18198 -70.93753,74.18198c-61.73611,0 -146.6975,0 -182,0c-30.99015,0 -71.13755,-29.61056 -71.13755,-75.18198z" fill="#252f36" stroke="#8fc1e7" stroke-width="3.5" stroke-linecap="butt"/><text transform="translate(132.09805,59.34239) scale(0.79837,0.79837)" font-size="40" xml:space="preserve" fill="#8fc1e7" stroke="#8fc1e7" stroke-width="1" stroke-linecap="butt" font-family="&quot;03UI&quot;, Sans Serif" font-weight="normal" text-anchor="start"><tspan x="0" dy="0">遊び方</tspan></text><path d="M63.1688,59.17862l-10.63547,-10.63547l10.5312,-10.5312" fill="none" stroke="#8fc1e7" stroke-width="3.5" stroke-linecap="round"/><text transform="translate(50.68358,99.00597) scale(0.43083,0.43083)" font-size="40" xml:space="preserve" fill="#8fc1e7" stroke="none" stroke-width="1" stroke-linecap="butt" font-family="&quot;03UI&quot;, Sans Serif" font-weight="normal" text-anchor="start"><tspan x="0" dy="0">それぞれのレベルにはミッション</tspan><tspan x="0" dy="48px">が用意されており、ミッションに</tspan><tspan x="0" dy="48px">は得点の合計やゴールまでの道の</tspan><tspan x="0" dy="48px">りなどが関係します。</tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px">例：得点80点ぴったり取れ！</tspan><tspan x="0" dy="48px">　　得点20点以下でゴールしろ！</tspan><tspan x="0" dy="48px">　　ゴールまで15マス以上通れ！</tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px">レベルの難易度が上がると、ミッ</tspan><tspan x="0" dy="48px">ションが2つになったりします。</tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px">クリアした際には、✰が１から3</tspan><tspan x="0" dy="48px">までつきます。この✰は、ミッシ</tspan><tspan x="0" dy="48px">ョンの達成にプラスしてより良い</tspan><tspan x="0" dy="48px">得点をとると星が増えます。</tspan><tspan x="0" dy="48px"> </tspan><tspan x="0" dy="48px">例：得点45点以下でゴールしろ！</tspan><tspan x="0" dy="48px">　　の場合</tspan><tspan x="0" dy="48px">　　✰ｘ3：38点以下</tspan><tspan x="0" dy="48px">　　✰ｘ2：39～42点</tspan><tspan x="0" dy="48px">　　✰ｘ1：43～45点</tspan><tspan x="0" dy="48px">　　　　　　　　　　　　　など</tspan></text><text transform="translate(145.29975,602.6) scale(0.52133,0.5)" font-size="40" xml:space="preserve" fill="#8fc1e7" stroke="none" stroke-width="1" stroke-linecap="butt" font-family="&quot;03UI&quot;, Sans Serif" font-weight="normal" text-anchor="start"><tspan x="0" dy="0">〈 3 〉</tspan></text></g></g></svg>